[commands.create_tests]
description = "Comprehensive Test Creation Instructions for Java Projects Using Spock Framework"

instructions = """
# Comprehensive Test Creation Instructions for Java Projects Using Spock Framework

## Overview
These instructions guide the systematic creation of tests for Java projects without existing test coverage, using the Spock Framework for behavior-driven testing in Groovy. The process leverages the scout-server MCP tools for building, testing, and coverage reporting.

## Required MCP Server Tools
- **scout-server**: Provides specialized tools for Gradle projects
  - `gradle_tester`: Executes Gradle build and check tasks
  - `gradle_jacoco_coverage_reporter`: Runs tests and generates JaCoCo coverage reports in XML format

## Phase 1: ANALYSIS PHASE

### Objectives
- Map the complete codebase architecture
- Identify testing priorities based on business criticality
- Document technical dependencies
- **Analyze existing tests to understand established patterns**

### Steps
1. **Codebase Scanning**
   - Identify all packages and their purposes
   - Map class relationships and dependencies
   - Document external dependencies (databases, APIs, message queues)
   - Identify entry points (controllers, main methods, scheduled tasks)
   - **Document existing package structure for mirror test organization**
   - **Catalog existing test files and their coverage**

2. **Initial Coverage Assessment**
   ```bash
   # Run initial coverage report using scout-server
   invoke scout-server:gradle_jacoco_coverage_reporter with projectRoot
   ```
   - Document baseline coverage metrics
   - Identify which packages have zero coverage
   - Identify packages that don't meet target coverage thresholds:
     - domain/: Below 90% (critical business logic)
     - service/: Below 80% (orchestration layer)
     - repository/: Below 70% (data access layer)
     - controller/: Below 75% (API layer)
     - util/: Below 85% (utility functions)
   - Save coverage report for comparison

3. **Existing Test Analysis**
   - **Identify Existing Tests**: Scan for any existing Spec files
   - **Pattern Recognition**: Document testing patterns already in use
   - **Coverage Gaps**: Identify which classes have tests and which don't
   - **Quality Assessment**: Evaluate existing test quality and completeness
   - **Style Guide Extraction**: Note naming conventions, structure preferences

4. **Component Classification**
   - **Core Business Logic**: Pure functions, domain models, calculators
   - **Infrastructure Code**: Database repositories, external API clients
   - **Orchestration Layer**: Services that coordinate multiple components
   - **Utilities**: Helper classes, common utilities

5. **Risk Assessment**
   - High-risk components (payment processing, data validation, security)
   - High-usage components (called by many other components)
   - Complex components (high cyclomatic complexity)
   - Components with frequent changes (check git history)

6. **Deliverables**
   - Component dependency graph
   - Prioritized testing order list
   - Risk assessment matrix
   - Complexity metrics per component
   - **Package structure mapping document**
   - **Existing test pattern documentation**
   - **Coverage gap analysis report (from scout-server)**

## Phase 2: PLANNING PHASE

### Objectives
- Design comprehensive test scenarios
- Plan test data strategies
- Define mock boundaries
- **Align with existing test patterns**

### Steps
1. **Test Case Design per Component**
   For each component, document:
   - Happy path scenarios
   - Edge cases (null, empty, boundary values)
   - Error scenarios (exceptions, invalid inputs)
   - Integration points requiring mocks
   - Performance-sensitive operations
   - **Gaps in existing test coverage**

2. **Pattern Alignment Strategy**
   - **Follow Existing Conventions**: Match established test structure
   - **Extend Current Patterns**: Build upon existing test utilities
   - **Reuse Test Fixtures**: Leverage existing test data builders
   - **Maintain Consistency**: Use same mocking strategies as existing tests

3. **Spock-Specific Test Planning**
   - Identify data-driven test opportunities
   - Plan where: blocks with meaningful test data
   - Design feature methods with descriptive names
   - Plan shared test fixtures using @Shared
   - **Align with existing Spock usage patterns**

4. **Test Data Strategy**
   Test: "Calculate pricing with various inputs"
   Data points:
   - Regular customer, small order
   - Premium customer, large order
   - New customer, edge case amounts
   - Invalid customer types
   - Null/empty inputs

5. **Mock Strategy Documentation**
   - External services → Always mock
   - Database calls → Mock for unit tests, real for integration
   - Time-dependent code → Use Clock abstraction
   - File system → Use in-memory alternatives
   - **Follow existing project mock patterns**

6. **Deliverables**
   - Test plan document per component
   - Data table specifications
   - Mock boundary definitions
   - Test execution order
   - **Test package structure plan matching source packages**
   - **Pattern consistency guidelines**

## Phase 3: IMPLEMENTATION PHASE

### Objectives
- Create well-structured test suites
- Implement maintainable test code
- Establish testing patterns
- **Mirror source code package structure exactly**
- **Extend existing tests where present**

### Steps
1. **Existing Test Enhancement**
   - **Review Current Tests**: Analyze existing Spec files
   - **Identify Missing Scenarios**: Add test cases for uncovered paths
   - **Refactor If Needed**: Improve existing tests while maintaining their intent
   - **Preserve Working Tests**: Don't break existing passing tests
   - **Extract Common Patterns**: Create shared utilities from repeated code

2. **Project Structure Setup - Mirroring Source Packages**
   ```
   src/
   ├── main/
   │   └── java/
   │       └── com/
   │           └── company/
   │               └── project/
   │                   ├── domain/
   │                   │   ├── User.java
   │                   │   └── Order.java
   │                   ├── service/
   │                   │   ├── UserService.java
   │                   │   └── OrderService.java
   │                   ├── repository/
   │                   │   └── UserRepository.java
   │                   └── util/
   │                       └── ValidationUtil.java
   └── test/
       └── groovy/
           └── com/
               └── company/
                   └── project/
                       ├── domain/
                       │   ├── UserSpec.groovy
                       │   └── OrderSpec.groovy
                       ├── service/
                       │   ├── UserServiceSpec.groovy
                       │   └── OrderServiceSpec.groovy
                       ├── repository/
                       │   └── UserRepositorySpec.groovy
                       └── util/
                           └── ValidationUtilSpec.groovy
   ```

3. **Package Structure Rules**
   - **Exact Mirror**: Test packages must exactly match source packages
   - **Naming Convention**: For class UserService.java in com.company.project.service, create UserServiceSpec.groovy in the same package structure
   - **Package-info**: If source has package-info.java, consider test package documentation
   - **Integration Tests**: Add sub-package for integration tests within the same structure
     `test/groovy/com/company/project/service/integration/UserServiceIntegrationSpec.groovy`

4. **Working with Existing Tests**
   When UserServiceSpec.groovy already exists:

   ```groovy
   class UserServiceSpec extends Specification {
       // EXISTING TEST - DO NOT REMOVE
       def "should create user successfully"() {
           // ... existing test code ...
       }

       // NEW TEST - ADDING COVERAGE
       def "should handle null user gracefully"() {
           given: "null user input"
           User user = null

           when: "creating user with null"
           userService.createUser(user)

           then: "appropriate exception is thrown"
           thrown(IllegalArgumentException)
       }

       // Follow same patterns as existing tests above
   }
   ```

5. **Continuous Validation During Implementation**
   After implementing each test class or significant test additions:
   ```bash
   # Run tests to ensure no regressions
   invoke scout-server:gradle_tester with projectRoot

   # Check coverage improvements
   invoke scout-server:gradle_jacoco_coverage_reporter with projectRoot
   ```

6. **Spock Test Implementation Pattern with Package Alignment**
   File: `src/test/groovy/com/company/project/service/UserServiceSpec.groovy`

   ```groovy
   package com.company.project.service

   import com.company.project.domain.User
   import com.company.project.repository.UserRepository
   import spock.lang.Specification
   import spock.lang.Subject
   import spock.lang.Title
   import spock.lang.Unroll

   @Title("User Service Tests")
   @Subject(UserService)
   class UserServiceSpec extends Specification {

       def userRepository = Mock(UserRepository)
       def userService = new UserService(userRepository)

       @Unroll
       def "should create user with valid data"() {
           given: "valid user data"
           def user = new User(name: "John", email: "john@example.com")

           when: "creating user"
           def result = userService.createUser(user)

           then: "user is saved"
           1 * userRepository.save(user) >> user
           result == user
       }
   }
   ```

7. **Test Organization Guidelines**
   - **Unit Tests**: Same package as source class
   - **Integration Tests**: Same package with .integration suffix
   - **Test Fixtures**: Create fixtures sub-package within relevant package
   - **Test Utilities**: Mirror util package structure for test utilities
   - **Existing Test Preservation**: Never delete working tests, only enhance

8. **Package-Specific Testing Patterns**
   Domain package tests - focus on business rules:
   ```groovy
   package com.company.project.domain
   class OrderSpec extends Specification {
       def "should calculate total with tax"() {
           // Domain logic tests
       }
   }
   ```

   Service package tests - focus on orchestration:
   ```groovy
   package com.company.project.service
   class OrderServiceSpec extends Specification {
       def "should coordinate order placement"() {
           // Service layer tests with mocks
       }
   }
   ```

   Repository package tests - focus on data access:
   ```groovy
   package com.company.project.repository
   class OrderRepositorySpec extends Specification {
       def "should find orders by customer"() {
           // Repository tests, possibly integration
       }
   }
   ```

9. **Import Management**
   - Tests should import from the same package structure
   - Avoid relative imports
   - Group imports: Spock, Java/Groovy, Project classes, Static imports
   - **Match import style of existing tests**

## Phase 4: EXECUTION PHASE

### Objectives
- Validate test implementation
- Achieve target coverage
- Ensure test stability
- **Verify package structure compliance**
- **Ensure existing tests still pass**

### Steps
1. **Initial Test Execution**
   ```bash
   # Run all tests using scout-server
   invoke scout-server:gradle_tester with projectRoot
   ```
   - Verify all tests pass
   - Document any failures
   - Check build time

2. **Package Coverage Verification**
   ```bash
   # Generate comprehensive coverage report by package
   invoke scout-server:gradle_jacoco_coverage_reporter with projectRoot
   ```
   - Parse XML report to verify each source package has corresponding test package
   - Check coverage metrics per package against targets:
     - domain/: 90% target
     - service/: 80% target
     - repository/: 70% target
     - controller/: 75% target
     - util/: 85% target
   - Identify packages with zero coverage
   - Identify packages below their target thresholds
   - **Compare coverage before and after additions**

3. **Failure Analysis Protocol**
   If tests fail:
   - Categorize failures by package
   - Document package-specific issues
   - Track cross-package integration failures
   - **Distinguish between existing test failures and new test failures**
   - Re-run specific test suites for debugging

4. **Coverage Measurement by Package**
   Package Coverage Targets:
   - domain/: 90% (critical business logic)
   - service/: 80% (orchestration layer)
   - repository/: 70% (data access layer)
   - controller/: 75% (API layer)
   - util/: 85% (utility functions)

5. **Iterative Improvement**
   Based on coverage reports:
   - Identify methods with zero coverage
   - Focus on packages below their target thresholds:
     - Priority 1: Packages with 0% coverage
     - Priority 2: Packages >20% below target (e.g., domain at 65% vs 90% target)
     - Priority 3: Packages 10-20% below target
     - Priority 4: Packages <10% below target
   - Add targeted tests for uncovered branches
   - Re-run coverage reporter after each improvement
   - Track progress towards coverage goals

## Phase 5: TEST BRITTLENESS VALIDATION PHASE

### Objectives
- Ensure tests actually validate behavior
- Eliminate false-positive tests
- Strengthen test assertions
- **Validate package-level test isolation**
- **Verify existing tests are not brittle**

### Steps
1. **Implementation Mutation Process**
   - Mutate implementations within each package
   - Verify tests in the same package detect mutations
   - Check that tests in other packages aren't affected
   - **Test both new and existing tests for brittleness**

   For each tested class:
   ```java
   // Original
   public int calculate(int input) {
       return input * 2;
   }

   // Mutated (change internal logic)
   public int calculate(int input) {
       return input + input;  // Same result, different implementation
   }

   // Or more aggressive mutation
   public int calculate(int input) {
       return 42;  // Completely wrong
   }
   ```

2. **Mutation Testing Validation**
   After each mutation:
   ```bash
   # Run tests to verify they catch the mutation
   invoke scout-server:gradle_tester with projectRoot
   ```
   - Ensure appropriate tests fail
   - Document which tests caught the mutation
   - Identify tests that didn't detect the change

3. **Package Isolation Verification**
   ```groovy
   // Ensure service tests don't break when domain internals change
   // Only public API changes should affect cross-package tests
   ```

4. **Test Validation Protocol**
   - Run package-specific test suites after mutations
   - Verify appropriate test failures
   - Ensure no cascading failures across packages
   - **Check that existing tests catch mutations appropriately**

5. **Common Brittleness Issues by Package Type**
   - **Domain Tests**: Over-testing getters/setters
   - **Service Tests**: Testing mock behavior instead of service logic
   - **Repository Tests**: Testing framework behavior
   - **Controller Tests**: Over-mocking service layer

6. **Restoration and Verification**
   - Restore original implementation
   - Run final validation:
   ```bash
   # Ensure all tests pass after restoration
   invoke scout-server:gradle_tester with projectRoot

   # Generate final coverage report
   invoke scout-server:gradle_jacoco_coverage_reporter with projectRoot
   ```
   - Verify all tests pass
   - **Confirm no regression in existing tests**

## Phase 6: REPORTING PHASE

### Objectives
- Document testing achievements
- Identify improvement opportunities
- Establish maintenance guidelines
- **Document package-level testing standards**
- **Report on existing test improvements**

### Steps
1. **Generate Final Coverage Report**
   ```bash
   # Generate comprehensive final coverage report
   invoke scout-server:gradle_jacoco_coverage_reporter with projectRoot
   ```
   - Parse and analyze the XML report
   - Create visualizations of coverage by package
   - Compare with initial baseline

2. **Package-Level Test Coverage Report**
   ```
   Test Coverage by Package:

   com.company.project.domain/
   ├── User.java         - 95% coverage (was 45%) - UserSpec.groovy
   └── Order.java        - 88% coverage (new) - OrderSpec.groovy

   com.company.project.service/
   ├── UserService.java  - 82% coverage (was 60%) - UserServiceSpec.groovy
   └── OrderService.java - 79% coverage (new) - OrderServiceSpec.groovy

   com.company.project.repository/
   └── UserRepository.java - 75% coverage (was 30%) - UserRepositorySpec.groovy

   Overall: 83% line coverage, 87% branch coverage
   Previous: 42% line coverage, 38% branch coverage
   ```

3. **Existing Test Enhancement Report**
   - Tests enhanced: List of existing tests with added scenarios
   - Tests refactored: List of tests improved for maintainability
   - Pattern standardization: How existing tests were aligned
   - Shared utilities extracted: Common code moved to fixtures

4. **Build Performance Report**
   Document test execution metrics from scout-server:
   - Total build time
   - Test execution time
   - Number of tests
   - Test stability (flaky test identification)

5. **Package Structure Compliance Report**
   - List any source packages without test packages
   - Identify misaligned test packages
   - Document intentional deviations with justification

6. **Test Organization Guidelines**
   Package Testing Standards:

   1. Every source package must have a corresponding test package
   2. Test class naming: [ClassName]Spec.groovy
   3. Integration tests: [package].integration sub-package
   4. Shared fixtures: [package].fixtures sub-package
   5. Test utilities: Mirror source util package structure
   6. Existing test patterns must be preserved and extended

7. **Maintenance Guidelines by Package**
   - **Domain Package Tests**: Focus on business rules, avoid infrastructure
   - **Service Package Tests**: Mock external dependencies, test orchestration
   - **Repository Package Tests**: Consider in-memory database for speed
   - **Controller Package Tests**: Use MockMvc or similar for endpoint testing

8. **Continuous Integration Setup**
   ```groovy
   // Example CI pipeline configuration
   stage('Test') {
       steps {
           // Use scout-server tools in CI
           sh 'invoke scout-server:gradle_tester'
           sh 'invoke scout-server:gradle_jacoco_coverage_reporter'
       }
   }
   ```

## Additional Guidelines

### Package Structure Best Practices
1. **Consistency**: Always mirror source package structure exactly
2. **Discovery**: IDE and build tools can better associate tests with source
3. **Navigation**: Developers can easily find tests for any class
4. **Refactoring**: Package moves in source should trigger test package moves
5. **Coverage**: Tools can accurately report package-level coverage

### Package-Specific Testing Strategies
- **Domain/Model Packages**: Unit tests only, no external dependencies
- **Service Packages**: Mix of unit and integration tests
- **Repository Packages**: Integration tests with test database
- **Controller Packages**: Integration tests with MockMvc
- **Util Packages**: Pure unit tests, high coverage expected

### Working with Existing Tests
1. **Never Delete**: Don't remove working tests, only enhance
2. **Pattern Matching**: Follow established patterns in the codebase
3. **Incremental Improvement**: Add missing scenarios to existing tests
4. **Refactor Carefully**: Improve readability while preserving intent
5. **Document Changes**: Comment why tests were modified

### Scout-Server Tool Usage Best Practices
1. **Regular Validation**: Run `gradle_tester` after each significant change
2. **Coverage Tracking**: Use `gradle_jacoco_coverage_reporter` to monitor progress
3. **CI Integration**: Incorporate both tools into continuous integration pipeline
4. **Performance Monitoring**: Track build times to ensure tests remain fast
5. **Report Analysis**: Parse XML coverage reports for detailed insights

### Tools and Resources
- Spock Framework documentation
- JaCoCo for coverage (via scout-server)
- scout-server MCP tools:
  - `gradle_tester`: Build and test execution
  - `gradle_jacoco_coverage_reporter`: Coverage analysis

### Success Criteria
- Every source package has a corresponding test package
- Package structure is 100% mirrored
- Tests are easily discoverable by package
- Package-level coverage meets defined targets
- Clear separation between unit and integration tests by package
- All critical components have test coverage
- No flaky tests in the suite
- Tests run in under 5 minutes (validated by scout-server)
- Clear documentation for maintenance
- Established testing culture and patterns
- Existing tests enhanced and still passing
- Consistent patterns across all tests
- Coverage reports generated and tracked via scout-server
"""


available_tools = ["filesystem", "shell", "scout-server"]
arguments = []
